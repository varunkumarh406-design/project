version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: stocksocial-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:alpine
    container_name: stocksocial-redis
    restart: always
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: stocksocial-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/stocksocial
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - PORT=5000
    depends_on:
      - mongo
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: stocksocial-client
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - server

volumes:
  mongo-data:
