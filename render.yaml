services:
  # Backend API
  - type: web
    name: stocksocial-api
    env: docker
    dockerfilePath: Dockerfile.server
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # User must provide this in Render dashboard
      - key: REDIS_URL
        fromService:
          type: redis
          name: stocksocial-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        fromService:
          type: web
          name: stocksocial-client
          property: host

  # Frontend Client
  - type: web
    name: stocksocial-client
    env: docker
    dockerfilePath: Dockerfile.client
    dockerContext: .
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://stocksocial-api.onrender.com/api # Replace with your actual API URL after first deploy

  # Redis for Caching
  - type: redis
    name: stocksocial-redis
    plan: free
    ipAllowList: [] # Only allow internal traffic
