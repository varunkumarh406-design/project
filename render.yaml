services:
  # Backend API
  - type: web
    name: stocksocial-api
    env: docker
    dockerfilePath: Dockerfile # Relative to the rootDir
    dockerContext: .          # Relative to the rootDir
    rootDir: server           # This tells Render to look in the 'server' folder
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: stocksocial-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        fromService:
          type: web
          name: stocksocial-client
          property: host

  # Frontend Client
  - type: web
    name: stocksocial-client
    env: docker
    dockerfilePath: Dockerfile # Relative to the rootDir
    dockerContext: .          # Relative to the rootDir
    rootDir: client           # This tells Render to look in the 'client' folder
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://stocksocial-api.onrender.com/api # Replace with actual API URL

  # Redis for Caching
  - type: redis
    name: stocksocial-redis
    plan: free
    ipAllowList: []
